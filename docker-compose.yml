version: '3.8'

# ─── Uso local para desarrollo y pruebas ──────────────────────────────────────
# docker compose up -d
# App disponible en: http://localhost:8080
# mysql disponible en: localhost:3306

services:
  app:
    build: .
    container_name: curso-gitops-app
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=mysql-db
      - DB_USER=curso_app
      - DB_PASSWORD=C4rs0_S3cur3_P@ss!
      - DB_NAME=curso_db
      - DB_PORT=3306
      - JWT_SECRET=dev_secret_change_in_production
      - PORT=8080
    depends_on:
      mysql-db:
        condition: service_healthy
    restart: unless-stopped

  mysql-db:
    image: mysql:8.0
    container_name: curso-gitops-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=r00t_S3cur3_P@ss!
      - MYSQL_DATABASE=curso_db
      - MYSQL_USER=curso_app
      - MYSQL_PASSWORD=C4rs0_S3cur3_P@ss!
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pr00t_S3cur3_P@ss!"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  mysql_data:
