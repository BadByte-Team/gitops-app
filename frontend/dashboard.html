<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curso GitOps — Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; color: #e2e8f0; }
    header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { color: #38bdf8; font-size: 1.3rem; }
    .logout-btn {
      background: transparent;
      border: 1px solid #475569;
      color: #94a3b8;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .logout-btn:hover { border-color: #f87171; color: #f87171; }
    main { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
    h2 { color: #e2e8f0; margin-bottom: 1.5rem; font-size: 1.2rem; }
    .module-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .module-num {
      background: #0ea5e9;
      color: white;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
      flex-shrink: 0;
    }
    .module-title { font-size: 1rem; color: #cbd5e1; }
    .loading { color: #475569; text-align: center; padding: 2rem; }
    footer { text-align: center; color: #334155; font-size: 0.78rem; padding: 2rem; }
  </style>
</head>
<body>
  <header>
    <h1>🚀 Curso GitOps</h1>
    <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
  </header>
  <main>
    <h2>Módulos del curso</h2>
    <div id="modules"><p class="loading">Cargando módulos...</p></div>
  </main>
  <footer>GitOps &copy; 2026</footer>

  <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/';

    async function loadModules() {
      try {
        const res = await fetch('/api/modules', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.status === 401) { logout(); return; }
        const data = await res.json();
        const container = document.getElementById('modules');
        if (!data.success || !data.data || !data.data.length) {
          container.innerHTML = '<p class="loading">No hay módulos disponibles aún.</p>';
          return;
        }
        container.innerHTML = data.data.map((m, i) => `
          <div class="module-card">
            <div class="module-num">${i + 1}</div>
            <div class="module-title">${m.title}</div>
          </div>
        `).join('');
      } catch {
        document.getElementById('modules').innerHTML = '<p class="loading">Error cargando módulos.</p>';
      }
    }

    function logout() {
      localStorage.clear();
      window.location.href = '/';
    }

    loadModules();
  </script>
</body>
</html>
