<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curso GitOps — Registro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0b0f19;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 12px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-icon {
      width: 52px;
      height: 52px;
      background: #238636;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.75rem;
    }

    .logo-icon svg {
      color: #fff;
      width: 26px;
      height: 26px;
    }

    .logo h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #e6edf3;
    }

    .logo p {
      color: #7d8590;
      font-size: 0.85rem;
      margin-top: 0.25rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.8rem;
      font-weight: 500;
      color: #7d8590;
      margin-bottom: 0.4rem;
    }

    .form-group label svg {
      width: 14px;
      height: 14px;
    }

    input {
      width: 100%;
      padding: 0.75rem 0.85rem;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #c9d1d9;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      outline: none;
    }

    input:focus {
      border-color: #238636;
    }

    .btn-primary {
      width: 100%;
      padding: 0.8rem;
      background: #238636;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.25rem;
    }

    .btn-primary svg {
      width: 16px;
      height: 16px;
    }

    .msg {
      font-size: 0.8rem;
      text-align: center;
      margin-top: 1rem;
      padding: 0.55rem;
      border-radius: 6px;
      display: none;
    }

    .msg.error {
      color: #f85149;
      background: #1c1214;
      border: 1px solid #3d1518;
    }

    .msg.success {
      color: #3fb950;
      background: #12201a;
      border: 1px solid #1b4332;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0;
      color: #30363d;
      font-size: 0.75rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #21262d;
    }

    .login-link {
      text-align: center;
      font-size: 0.8rem;
      color: #7d8590;
    }

    .login-link a {
      color: #58a6ff;
      text-decoration: none;
      font-weight: 500;
    }

    footer {
      text-align: center;
      margin-top: 1.75rem;
      font-size: 0.7rem;
      color: #30363d;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon"><i data-lucide="user-plus"></i></div>
      <h1>Curso GitOps</h1>
      <p>Crea tu cuenta</p>
    </div>
    <form id="registerForm">
      <div class="form-group">
        <label><i data-lucide="user"></i> Usuario (mín. 3 caracteres)</label>
        <input type="text" id="username" placeholder="elige un usuario" minlength="3" required>
      </div>
      <div class="form-group">
        <label><i data-lucide="lock"></i> Contraseña (mín. 6 caracteres)</label>
        <input type="password" id="password" placeholder="••••••••" minlength="6" required>
      </div>
      <div class="form-group">
        <label><i data-lucide="shield-check"></i> Confirmar contraseña</label>
        <input type="password" id="confirmPassword" placeholder="••••••••" minlength="6" required>
      </div>
      <button type="submit" class="btn-primary" id="registerBtn">
        <i data-lucide="user-plus"></i> Crear cuenta
      </button>
      <div class="msg error" id="errorMsg"></div>
      <div class="msg success" id="successMsg"></div>
    </form>
    <div class="divider">o</div>
    <div class="login-link">¿Ya tienes cuenta? <a href="/">Inicia sesión</a></div>
    <footer>GitOps &copy; 2026</footer>
  </div>

  <script>
    lucide.createIcons();
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('registerBtn');
      const errorEl = document.getElementById('errorMsg');
      const successEl = document.getElementById('successMsg');
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      errorEl.style.display = 'none';
      successEl.style.display = 'none';
      if (password !== confirmPassword) {
        errorEl.textContent = 'Las contraseñas no coinciden.';
        errorEl.style.display = 'block';
        return;
      }
      btn.innerHTML = '<i data-lucide="loader"></i> Creando cuenta...';
      btn.disabled = true;
      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: document.getElementById('username').value, password })
        });
        const data = await res.json();
        if (data.success) {
          successEl.textContent = '¡Cuenta creada! Redirigiendo...';
          successEl.style.display = 'block';
          setTimeout(() => { window.location.href = '/'; }, 1500);
        } else { throw new Error(data.message || 'Error al registrar'); }
      } catch (err) {
        errorEl.textContent = err.message || 'Error al registrar.';
        errorEl.style.display = 'block';
      } finally {
        btn.innerHTML = '<i data-lucide="user-plus"></i> Crear cuenta';
        btn.disabled = false;
        lucide.createIcons();
      }
    });
  </script>
</body>

</html>
