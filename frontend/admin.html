<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curso GitOps — Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0f172a; color: #e2e8f0; }
    header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { color: #38bdf8; font-size: 1.3rem; }
    .badge { background: #7c3aed; color: white; font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 4px; margin-left: 0.5rem; }
    .logout-btn {
      background: transparent; border: 1px solid #475569; color: #94a3b8;
      padding: 0.4rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem;
    }
    .logout-btn:hover { border-color: #f87171; color: #f87171; }
    main { max-width: 1000px; margin: 2rem auto; padding: 0 1.5rem; }
    .section { margin-bottom: 2.5rem; }
    h2 { color: #e2e8f0; margin-bottom: 1.25rem; font-size: 1.1rem; display: flex; align-items: center; gap: 0.5rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      padding: 0.75rem 1rem;
      text-align: left;
      border-bottom: 1px solid #334155;
      font-size: 0.9rem;
    }
    th { color: #94a3b8; font-weight: 500; background: #1e293b; }
    td { color: #cbd5e1; }
    tr:hover td { background: #1e293b55; }
    .role-admin { color: #a78bfa; font-weight: 600; }
    .role-student { color: #34d399; }
    .loading { color: #475569; text-align: center; padding: 2rem; }
    footer { text-align: center; color: #334155; font-size: 0.78rem; padding: 2rem; }
  </style>
</head>
<body>
  <header>
    <h1>🚀 Curso GitOps <span class="badge">ADMIN</span></h1>
    <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
  </header>
  <main>
    <div class="section">
      <h2>👥 Usuarios registrados</h2>
      <table>
        <thead>
          <tr><th>ID</th><th>Usuario</th><th>Rol</th><th>Registrado</th></tr>
        </thead>
        <tbody id="usersTable"><tr><td colspan="4" class="loading">Cargando...</td></tr></tbody>
      </table>
    </div>
    <div class="section">
      <h2>📦 Módulos (todos)</h2>
      <table>
        <thead>
          <tr><th>ID</th><th>Título</th><th>Estado</th></tr>
        </thead>
        <tbody id="modulesTable"><tr><td colspan="3" class="loading">Cargando...</td></tr></tbody>
      </table>
    </div>
  </main>
  <footer>GitOps &copy; 2026</footer>

  <script>
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');
    if (!token || role !== 'admin') window.location.href = '/';

    async function apiFetch(url) {
      const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
      if (res.status === 401 || res.status === 403) { logout(); return null; }
      return res.json();
    }

    async function loadUsers() {
      const data = await apiFetch('/api/users');
      const tbody = document.getElementById('usersTable');
      if (!data || !data.data) { tbody.innerHTML = '<tr><td colspan="4">Sin datos</td></tr>'; return; }
      tbody.innerHTML = data.data.map(u => `
        <tr>
          <td>${u.id}</td>
          <td>${u.username}</td>
          <td class="role-${u.role}">${u.role}</td>
          <td>${new Date(u.created_at).toLocaleDateString('es')}</td>
        </tr>
      `).join('');
    }

    async function loadModules() {
      const data = await apiFetch('/api/modules');
      const tbody = document.getElementById('modulesTable');
      if (!data || !data.data) { tbody.innerHTML = '<tr><td colspan="3">Sin datos</td></tr>'; return; }
      tbody.innerHTML = data.data.map(m => `
        <tr>
          <td>${m.id}</td>
          <td>${m.title}</td>
          <td>${m.is_hidden ? '🔒 Oculto' : '✅ Visible'}</td>
        </tr>
      `).join('');
    }

    function logout() {
      localStorage.clear();
      window.location.href = '/';
    }

    loadUsers();
    loadModules();
  </script>
</body>
</html>
